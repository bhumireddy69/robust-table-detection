name: TableDetectorCoreML

options:
  bundleIdPrefix: com.robusttabledetection
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

targets:
  TableDetectorCoreML:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: TableDetector
    settings:
      base:
        PRODUCT_NAME: TableDetectorCoreML
        PRODUCT_BUNDLE_IDENTIFIER: com.robusttabledetection.TableDetectorCoreML
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TableDetector CoreML
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  TableDetectorCoreMLTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: TableDetectorTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robusttabledetection.TableDetectorCoreMLTests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: TableDetectorCoreML

schemes:
  TableDetectorCoreML:
    build:
      targets:
        TableDetectorCoreML: all
        TableDetectorCoreMLTests: [test]
    test:
      config: Debug
      targets:
        - TableDetectorCoreMLTests
    run:
      config: Debug
    archive:
      config: Release
